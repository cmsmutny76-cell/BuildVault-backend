<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle with gold border -->
  <circle cx="60" cy="60" r="58" stroke="#D4AF37" stroke-width="4" fill="url(#blueGradient)"/>
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Dividing lines creating quadrants -->
  <line x1="60" y1="15" x2="60" y2="105" stroke="#D4AF37" stroke-width="2"/>
  <line x1="15" y1="60" x2="105" y2="60" stroke="#D4AF37" stroke-width="2"/>
  
  <!-- Top Left: Residential House -->
  <g transform="translate(30, 25)">
    <path d="M10 20 L20 10 L30 20 L30 35 L10 35 Z" fill="white"/>
    <path d="M20 10 L30 20" stroke="#1e40af" stroke-width="1.5"/>
    <path d="M10 20 L20 10" stroke="#1e40af" stroke-width="1.5"/>
    <rect x="15" y="25" width="5" height="7" fill="#D4AF37"/>
    <rect x="23" y="22" width="4" height="4" fill="#3b82f6"/>
  </g>
  
  <!-- Top Right: Commercial Building -->
  <g transform="translate(65, 25)">
    <rect x="12" y="12" width="16" height="23" fill="white" stroke="#1e40af" stroke-width="1.5"/>
    <rect x="14" y="15" width="3" height="3" fill="#3b82f6"/>
    <rect x="18" y="15" width="3" height="3" fill="#3b82f6"/>
    <rect x="23" y="15" width="3" height="3" fill="#3b82f6"/>
    <rect x="14" y="20" width="3" height="3" fill="#3b82f6"/>
    <rect x="18" y="20" width="3" height="3" fill="#3b82f6"/>
    <rect x="23" y="20" width="3" height="3" fill="#3b82f6"/>
    <rect x="14" y="25" width="3" height="3" fill="#3b82f6"/>
    <rect x="18" y="25" width="3" height="3" fill="#3b82f6"/>
    <rect x="23" y="25" width="3" height="3" fill="#3b82f6"/>
    <rect x="16" y="30" width="8" height="5" fill="#D4AF37"/>
  </g>
  
  <!-- Bottom Left: Landscaping/Tree -->
  <g transform="translate(30, 65)">
    <circle cx="20" cy="15" r="8" fill="#10b981"/>
    <circle cx="16" cy="12" r="6" fill="#059669"/>
    <circle cx="24" cy="12" r="6" fill="#059669"/>
    <rect x="18" y="20" width="4" height="10" fill="#92400e"/>
    <path d="M12 30 L20 26 L28 30" stroke="#D4AF37" stroke-width="1.5" fill="none"/>
  </g>
  
  <!-- Bottom Right: Apartment/Remodeling Tools -->
  <g transform="translate(65, 65)">
    <rect x="12" y="15" width="16" height="15" fill="white" stroke="#1e40af" stroke-width="1.5"/>
    <rect x="14" y="17" width="5" height="4" fill="#3b82f6"/>
    <rect x="21" y="17" width="5" height="4" fill="#3b82f6"/>
    <rect x="14" y="23" width="5" height="4" fill="#3b82f6"/>
    <rect x="21" y="23" width="5" height="4" fill="#3b82f6"/>
    <!-- Hammer icon overlay -->
    <path d="M18 12 L22 16 M22 16 L24 14" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
    <rect x="17" y="11" width="2" height="6" fill="#D4AF37" transform="rotate(-45 18 14)"/>
  </g>
  
  <!-- Center badge with company initial or icon -->
  <circle cx="60" cy="60" r="12" fill="url(#goldGradient)"/>
  <text x="60" y="66" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e40af" text-anchor="middle">CL</text>
</svg>
