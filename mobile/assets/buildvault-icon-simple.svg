<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Simple version for small sizes (app icon) -->
  
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F7931E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="vault" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="shine">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  
  <!-- Vault door base -->
  <circle cx="256" cy="256" r="200" fill="url(#vault)"/>
  
  <!-- Vault door edge highlight -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#F7931E" stroke-width="16"/>
  
  <!-- Vault combination dial outer ring -->
  <circle cx="256" cy="256" r="130" fill="#2563EB"/>
  <circle cx="256" cy="256" r="120" fill="white"/>
  
  <!-- BV Letters -->
  <text x="256" y="295" font-family="Arial, Helvetica, sans-serif" font-size="100" font-weight="900" fill="#1E3A8A" text-anchor="middle" letter-spacing="-5">BV</text>
  
  <!-- Dial markings -->
  <g transform="translate(256, 256)">
    <!-- 12 position markers around the dial -->
    <rect x="-4" y="-135" width="8" height="20" fill="#F7931E" rx="2"/>
    <rect x="-4" y="-135" width="8" height="20" fill="#F7931E" rx="2" transform="rotate(30)"/>
    <rect x="-4" y="-135" width="8" height="20" fill="#F7931E" rx="2" transform="rotate(60)"/>
    <rect x="-4" y="-135" width="8" height="20" fill="#1E3A8A" rx="2" transform="rotate(90)"/>
    <rect x="-4" y="-135" width="8" height="20" fill="#F7931E" rx="2" transform="rotate(120)"/>
    <rect x="-4" y="-135" width="8" height="20" fill="#F7931E" rx="2" transform="rotate(150)"/>
    <rect x="-4" y="-135" width="8" height="20" fill="#F7931E" rx="2" transform="rotate(180)"/>
    <rect x="-4" y="-135" width="8" height="20" fill="#F7931E" rx="2" transform="rotate(210)"/>
    <rect x="-4" y="-135" width="8" height="20" fill="#F7931E" rx="2" transform="rotate(240)"/>
    <rect x="-4" y="-135" width="8" height="20" fill="#1E3A8A" rx="2" transform="rotate(270)"/>
    <rect x="-4" y="-135" width="8" height="20" fill="#F7931E" rx="2" transform="rotate(300)"/>
    <rect x="-4" y="-135" width="8" height="20" fill="#F7931E" rx="2" transform="rotate(330)"/>
  </g>
  
  <!-- Center dial indicator -->
  <circle cx="256" cy="256" r="145" fill="none" stroke="#374151" stroke-width="3" opacity="0.3"/>
  
  <!-- Glossy shine overlay -->
  <ellipse cx="256" cy="180" rx="150" ry="100" fill="url(#shine)"/>
  
  <!-- Subtle construction icon in background -->
  <g opacity="0.15">
    <!-- Hard hat silhouette -->
    <path d="M 150 180 Q 150 140 180 130 L 180 140 Q 200 120 256 120 Q 312 120 332 140 L 332 130 Q 362 140 362 180 L 150 180" fill="white"/>
    <rect x="140" y="180" width="232" height="15" fill="white" rx="3"/>
  </g>
</svg>